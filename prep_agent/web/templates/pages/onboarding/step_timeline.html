<h3>Step 3: Set Your Timeline</h3>
<p class="text-muted">Configure your study schedule for <strong>{{ template_name }}</strong>.</p>

<form hx-post="/onboarding/step/confirm" hx-target=".content" hx-swap="innerHTML" class="onboarding-form">
    <input type="hidden" name="session_id" value="{{ session_id }}">

    <div class="form-row">
        <label>Preparation Duration (weeks)</label>
        <input type="number" name="weeks" value="{{ suggested_weeks }}" min="1" max="52">
    </div>

    <div class="form-row">
        <label>Hours per Day</label>
        <input type="number" name="hours_per_day" value="2.0" min="0.5" max="12" step="0.5">
    </div>

    <div class="form-row">
        <label>Study Days (comma-separated)</label>
        <input type="text" name="study_days" value="mon,tue,wed,thu,fri" placeholder="mon,tue,wed,thu,fri,sat">
    </div>

    <button type="submit" class="btn btn-accent btn-large">Review Plan</button>
</form>
