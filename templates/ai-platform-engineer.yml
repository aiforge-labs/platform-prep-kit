interview_questions:
  technical:
    - "Design a document Q&A system for a company with 100,000 internal documents. Walk me through every component from ingestion to response, and explain the trade-offs you'd make."
    - "A RAG system is returning irrelevant context 40% of the time. How would you diagnose and fix this systematically?"
    - "Compare vLLM and Text Generation Inference. When would you choose one over the other for a production deployment?"
    - "Explain the KV cache in LLM inference. How does it affect memory usage and what happens when it fills up?"
    - "How would you design a cost management strategy for an LLM service that receives 1 million requests per day?"
    - "Walk me through how you would evaluate whether upgrading from GPT-3.5 to GPT-4 is worth the cost increase for a specific use case."
    - "An agent is getting stuck in an infinite tool-calling loop. How would you design the system to prevent this, and how would you debug it in production?"
    - "Explain the difference between dense retrieval, sparse retrieval, and hybrid search. When would you use each?"
    - "How would you implement semantic caching for an LLM application, and what are the risks of getting it wrong?"
    - "What is the difference between a faithfulness hallucination and a relevance hallucination? How would you detect each in production?"
  leadership:
    - "A product team wants to ship an LLM feature in two weeks. You know the evaluation framework isn't ready. How do you handle this?"
    - "How do you decide when to use a managed AI service (e.g., Bedrock) versus self-hosting an open-source model?"
    - "How would you build an internal knowledge base about your team's LLM architecture decisions so new engineers can onboard faster?"
    - "Describe how you would measure the success of an AI platform you built. What metrics would you track and why?"
    - "An LLM in production starts producing noticeably worse outputs after a provider silently updates the underlying model. How do you respond?"

content_suggestions:
  - type: blog_post
    title: "RAG in Production: What Nobody Tells You About Chunking"
    description: "A practical guide covering chunking strategy selection based on document type, how chunk size affects retrieval precision and context utilization, and a benchmark of five chunking strategies on three document types. Include code examples and real retrieval metric comparisons."
    audience: "Engineers building their first or second RAG system"
  - type: blog_post
    title: "Choosing a Vector Database: A Decision Framework"
    description: "Cut through the hype with a structured comparison of Pinecone, Qdrant, Weaviate, and pgvector across five dimensions: query latency at scale, filtering capabilities, managed vs self-hosted operational burden, multi-tenancy patterns, and hybrid search support. Include a decision flowchart."
    audience: "Engineers evaluating vector database options for production"
  - type: project
    title: "Open-Source RAG Evaluation Dashboard"
    description: "Build and publish a lightweight RAG evaluation harness that measures retrieval precision/recall and generation faithfulness using RAGAS, outputs a visual dashboard, and integrates as a GitHub Actions step. This becomes a reusable tool and demonstrates production engineering thinking."
    audience: "The AI engineering community — useful for anyone building RAG systems"
