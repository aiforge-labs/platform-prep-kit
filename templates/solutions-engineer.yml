interview_questions:
  technical:
    - "A customer's architect says they already have an internal tool that does 80% of what your product does. How do you respond?"
    - "Walk me through how you would run a discovery call for a customer evaluating a cloud governance platform. What questions would you ask and in what order?"
    - "Design a 3-week POC for a customer evaluating whether your product can automate their SOC 2 evidence collection. What are the success criteria and what would you deliver?"
    - "How would you explain the ROI of a cloud security posture management tool to a CFO who wants hard numbers?"
    - "A customer says 'we evaluated your product six months ago and it couldn't do X.' How do you handle this without throwing your company under the bus?"
    - "Walk me through how you build a demo environment. What decisions do you make and why?"
    - "A customer asks a technical question you don't know the answer to during a demo. What do you do?"
    - "How would you whiteboard a solution for a customer who needs to enforce compliance policies across 50 AWS accounts?"
    - "What does a good POC mutual success plan look like? Walk me through the components."
    - "A customer is 3 weeks into a 4-week POC and progress is behind schedule. What do you do?"
  leadership:
    - "Tell me about a deal where you lost to a competitor. What would you do differently?"
    - "How do you manage your time when you have five active POCs, two RFPs due, and three discovery calls this week?"
    - "How do you build a trusted advisor relationship with a customer's technical team during a sales cycle?"
    - "A product manager wants to add a feature that customers keep asking for in POCs. How do you communicate this feedback constructively?"
    - "How do you stay technically current in a rapidly evolving domain while spending most of your time in customer-facing activities?"

content_suggestions:
  - type: blog_post
    title: "The Art of the POC: Scoping for a Win"
    description: "Honest guide to designing POCs that prove value without becoming open-ended consulting engagements. Cover mutual success plans, success criteria design, scope control techniques, and how to convert a positive POC into momentum. Include templates for a 2-week and 4-week POC mutual success plan."
    audience: "Solutions engineers and presales professionals"
  - type: blog_post
    title: "Technical Discovery: Questions That Actually Uncover Pain"
    description: "Collection of discovery questions organized by category: current state architecture, operational pain, compliance requirements, scale requirements, and team structure. For each question, explain what you're really trying to find out and how to follow up on the answer."
    audience: "Solutions engineers preparing for discovery calls"
  - type: project
    title: "Demo Environment Starter Kit"
    description: "Build and publish a Docker Compose or Kubernetes-based demo environment template for a chosen domain (e.g., cloud governance, DevSecOps pipeline). Include realistic synthetic data, a demo script with talking points, and a walkthrough video. Demonstrates SE-specific skills: not just technical depth but demo craft."
    audience: "Solutions engineers building demo environments for their product domain"
