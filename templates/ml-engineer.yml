interview_questions:
  technical:
    - "Design a machine learning system to detect fraudulent transactions in real time. Walk me through every component from data ingestion to model serving to monitoring."
    - "What is train-serve skew? How would you detect it in production and how would you design your feature pipeline to prevent it?"
    - "Explain the difference between data drift, concept drift, and label drift. How would you monitor for each in production?"
    - "A model that has been performing well for 6 months suddenly shows a 15% drop in precision. Walk me through your debugging process."
    - "What is the champion-challenger pattern? When and how would you use it to safely roll out a new model version?"
    - "Explain point-in-time correctness in the context of feature stores. Why does it matter for training and what goes wrong without it?"
    - "Compare batch serving and online serving for a recommendation system. When would you choose each?"
    - "How would you design a feature store for an organization with 20 ML teams working on different products?"
    - "Walk me through how you would implement a retraining pipeline that triggers automatically when data drift is detected."
    - "What is knowledge distillation and when would you use it? What are the trade-offs vs quantization?"
  leadership:
    - "How do you decide when a business problem needs ML vs a simpler rule-based solution?"
    - "A data scientist built a model that works great in notebooks but fails in production. How do you approach fixing this systematically?"
    - "How do you communicate model performance to non-technical stakeholders who care about business outcomes, not AUC-ROC?"
    - "How would you build a culture of ML engineering best practices in a team of data scientists who aren't trained as software engineers?"
    - "Describe how you would measure and improve the reliability of ML pipelines in production."

content_suggestions:
  - type: blog_post
    title: "Train-Serve Skew: The Silent ML Production Killer"
    description: "Deep dive into train-serve skew — the class of bugs where the feature values the model sees at training time differ from those it sees at inference. Cover the three root causes, how feature stores prevent it, and a practical checklist for auditing your own ML system."
    audience: "ML engineers and data scientists deploying their first production models"
  - type: blog_post
    title: "Choosing Between Kubeflow, SageMaker Pipelines, and Metaflow"
    description: "Structured comparison of three leading ML pipeline orchestrators. Evaluate each on: learning curve, portability, local development experience, deployment complexity, cost, and ecosystem maturity. Include a decision framework and honest assessment of where each falls short."
    audience: "ML engineers selecting pipeline orchestration tooling"
  - type: project
    title: "End-to-End ML Project Template with Full MLOps Stack"
    description: "Build and publish a template repository that demonstrates: DVC for data versioning, MLflow for experiment tracking and model registry, Evidently for drift detection, and BentoML for serving. Include a GitHub Actions pipeline that trains, evaluates, and registers the model. Demonstrate best practices, not just tool usage."
    audience: "ML engineers and data scientists learning production ML practices"
