interview_questions:
  technical:
    - "Define SLIs and SLOs for a payment processing API. What would you measure, what targets would you set, and how would you handle the error budget policy?"
    - "Walk me through the multiwindow, multi-burn-rate alerting approach for SLOs. Why is it better than simple threshold alerting on availability?"
    - "A service has an SLO of 99.9% availability over 30 days. It has been down for 35 minutes this month. How much error budget remains and what does that mean for the team?"
    - "Explain the difference between the USE method and the RED method. When would you apply each?"
    - "How would you design distributed tracing for a system with 15 microservices? What sampling strategy would you choose and why?"
    - "Walk me through how you would respond to a P0 incident where a payment service is returning 500 errors for 20% of requests."
    - "How do you distinguish between a symptom and a root cause in a post-mortem? Give an example."
    - "Design a chaos experiment to test the resilience of a service that depends on a third-party API that occasionally has high latency."
    - "How would you identify and quantify toil in your team's operations? What would your strategy be to reduce it over one quarter?"
    - "Explain head-based vs tail-based trace sampling. When would you use each and what are the trade-offs?"
  leadership:
    - "How do you convince a product team that investing in reliability work is worth delaying feature development?"
    - "Tell me about a post-mortem you led. How did you maintain a blameless culture while still identifying actionable improvements?"
    - "How do you design an on-call rotation that is sustainable and doesn't lead to engineer burnout?"
    - "Describe how you would introduce SLOs to an organization that currently does not have them. Where would you start?"
    - "How do you balance investing in automation (reducing toil) vs responding to immediate operational needs?"

content_suggestions:
  - type: blog_post
    title: "Error Budget Burn Rate Alerting: A Practical Walkthrough"
    description: "Walk through the mathematics of error budget burn rate, explain multiwindow alerting (short window for fast detection, long window to reduce noise), and provide complete Prometheus alerting rules with explanation. Include worked examples with real SLO numbers."
    audience: "Engineers setting up SLO-based alerting for the first time"
  - type: blog_post
    title: "The Blameless Post-Mortem: A Facilitation Guide"
    description: "Practical guide to facilitating post-mortems that produce real learning and action items, not just documentation. Cover timeline reconstruction techniques, how to identify contributing factors vs root causes, writing actionable (not vague) action items, and common facilitation anti-patterns."
    audience: "SREs and engineering managers who run incident reviews"
  - type: project
    title: "SLO Dashboard Template for Grafana"
    description: "Build and publish a reusable Grafana dashboard template that visualizes error budget burn rate, remaining budget, and SLO compliance over rolling and calendar windows. Include Prometheus alerting rules. This is a practical resource the community can use directly."
    audience: "SRE teams instrumenting their first SLOs"
