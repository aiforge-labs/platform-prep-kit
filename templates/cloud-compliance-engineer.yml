interview_questions:
  technical:
    - "Design a continuous compliance pipeline for a multi-account AWS environment that must maintain SOC 2 compliance. Cover tooling, evidence collection, and remediation workflows."
    - "Write an OPA Rego policy that denies any S3 bucket creation without server-side encryption enabled and public access blocked."
    - "What is the difference between a preventive control and a detective control? Give three examples of each in a cloud environment."
    - "How would you design AWS Config rules for PCI-DSS compliance? Which rules are available managed vs custom-built?"
    - "Explain how AWS Service Control Policies work. What is a common SCP you would implement for all accounts in an organization?"
    - "A critical CIS Benchmark finding — unrestricted SSH access from 0.0.0.0/0 — is found in 15 production accounts. Walk me through your remediation approach."
    - "How do you handle false positives in automated compliance scanning without disabling important rules entirely?"
    - "Design a compliance evidence collection system for a SOC 2 audit that minimizes manual effort during audit preparation."
    - "Explain the difference between AWS Security Hub, AWS Config, and AWS GuardDuty. When would you use each?"
    - "How would you build a compliance posture dashboard that shows trend over time, not just current state?"
  leadership:
    - "How do you prioritize compliance remediation when you have 500 open findings and limited engineering resources?"
    - "How do you explain the business value of automated compliance tooling to an executive who sees it as overhead?"
    - "Tell me about a time you prevented a compliance failure from becoming an audit finding. What detection mechanism caught it?"
    - "How would you drive compliance adoption across engineering teams that see compliance as someone else's problem?"
    - "How do you balance compliance requirements that seem at odds with developer velocity?"

content_suggestions:
  - type: blog_post
    title: "Building a Continuous SOC 2 Compliance Pipeline on AWS"
    description: "Practical walkthrough of building an automated SOC 2 compliance pipeline: AWS Config rules mapped to Trust Service Criteria, automated evidence export to S3, CloudTrail as change evidence, and a compliance dashboard in Security Hub. Include the IaC to deploy the entire pipeline."
    audience: "Cloud engineers and compliance teams preparing for SOC 2"
  - type: blog_post
    title: "Writing OPA Policies for Terraform: A Practical Guide"
    description: "Tutorial on using Conftest + OPA to validate Terraform plans against compliance policies before apply. Include five worked policy examples (S3 encryption, security group rules, public IP restrictions, encryption key requirements), test writing, and CI integration."
    audience: "Platform engineers and cloud compliance engineers"
  - type: project
    title: "Multi-Framework Compliance Policy Library"
    description: "Build and publish an open-source library of OPA/Rego policies mapped to CIS AWS Foundations Benchmark, SOC 2 CC controls, and PCI-DSS requirements. Include Conftest integration, a framework cross-mapping document, and CI workflows. Community can contribute policies for additional frameworks."
    audience: "Cloud compliance engineers needing policy-as-code starting points"
