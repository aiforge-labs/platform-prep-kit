name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,ui,dev]"

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

      - name: Run import check
        run: |
          python -c "from prep_agent.cli import main; print('CLI import OK')"
          python -c "from prep_agent.web.app import create_app; print('Web app import OK')"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,ui,dev]"

      - name: Check for syntax errors
        run: |
          python -m py_compile prep_agent/cli.py
          python -m py_compile prep_agent/web/app.py
          python -m py_compile prep_agent/web/database.py
          python -m py_compile prep_agent/web/migrate.py
          echo "All files compile OK"

      - name: Check no secrets in codebase
        run: |
          ! grep -r "sk-[a-zA-Z0-9]\{20,\}" prep_agent/ --include="*.py"
          ! grep -r "AKIA[A-Z0-9]\{16\}" prep_agent/ --include="*.py"
          echo "No secrets found"

  # Single gate check — use this as the required status check in branch protection
  ci-pass:
    if: always()
    needs: [test, lint]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.test.result }}" != "success" || "${{ needs.lint.result }}" != "success" ]]; then
            echo "CI failed: test=${{ needs.test.result }}, lint=${{ needs.lint.result }}"
            exit 1
          fi
          echo "All CI checks passed"
