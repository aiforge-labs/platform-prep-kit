name: Docker Publish

# Build and publish the container image to GHCR.
#
# Triggers:
#   push to main     → publishes ghcr.io/<owner>/<repo>:main-<sha>
#   release tag v*   → publishes versioned tags (v1.2.3, 1.2, 1, latest)
#   manual dispatch  → builds a one-off image on any ref
#
# Supply-chain note: action versions below use tag references; Dependabot
# (.github/dependabot.yml) will propose SHA-pinned updates weekly to match
# the pinning style of .github/workflows/ci.yml.

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write
  # id-token used for provenance / attestation (build-push-action writes SLSA
  # provenance when this is available).
  id-token: write
  attestations: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # branch push: main-<short-sha>  and  main
            type=ref,event=branch
            type=sha,prefix=,format=short,enable=${{ github.ref_name == 'main' }}
            # release tags: v1.2.3, 1.2, 1
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # latest only on semver releases, not every main push
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.title=platform-prep-kit
            org.opencontainers.image.description=Self-hosted interview prep for cloud, platform, and AI-security engineers
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Generate build provenance attestation
        # Only attest on real releases, not every branch push
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
